<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TripWeather" />
  <meta name="description" content="See the weather forecast for each town on your road trip, timed to when you'll be there." />
  <title>Road Trip Weather</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="static/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="static/icons/icon-180.png" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <div id="sidebar">
    <h1>🚗 Road Trip Weather</h1>
    <p class="tagline">See the forecast for each town <em>when you'll be there.</em></p>

    <form id="trip-form" autocomplete="off">
      <div class="route-box">
        <div class="route-rail" aria-hidden="true">
          <span class="rail-dot rail-start"></span>
          <span class="rail-line"></span>
          <span class="rail-dot rail-end"></span>
        </div>
        <div class="route-inputs">
          <div class="field" id="from-field">
            <label for="from">Start</label>
            <input type="text" id="from" placeholder="Phoenix, AZ" required />
            <button type="button" id="locate" class="locate-btn"
                    title="Use my current location"
                    aria-label="Use my current location">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round"
                   stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3.5" />
                <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
              </svg>
            </button>
          </div>
          <div class="field">
            <label for="to">Destination</label>
            <input type="text" id="to" placeholder="Albuquerque, NM" required />
          </div>
        </div>
        <button type="button" id="swap" title="Swap start and destination"
                aria-label="Swap start and destination">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M7 4v13M7 17l-3-3M7 17l3-3" />
            <path d="M17 20V7M17 7l-3 3M17 7l3 3" />
          </svg>
        </button>
      </div>

      <div class="field">
        <label for="depart">Departure</label>
        <input type="datetime-local" id="depart" />
      </div>

      <div class="interval-group" role="group" aria-label="Weather stop every">
        <span class="interval-label">Weather stop every</span>
        <div class="segmented" id="interval-seg">
          <button type="button" data-value="1800">30 min</button>
          <button type="button" data-value="3600" class="selected" aria-pressed="true">1 hr</button>
          <button type="button" data-value="7200">2 hr</button>
          <button type="button" data-value="10800">3 hr</button>
        </div>
        <input type="hidden" id="interval" value="3600" />
      </div>

      <button type="submit" id="go">Plan trip</button>
    </form>

    <div id="status"></div>
    <div id="routes"></div>
    <div id="summary"></div>
    <div id="alert" role="alert" aria-live="assertive"></div>
    <div id="stops"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="static/api.js"></script>
  <script src="static/app.js"></script>
  <script>
    // Register the service worker (makes the app installable & shell-cached).
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {
        /* non-fatal: app still works without offline support */
      });
    }
  </script>
</body>
</html>
